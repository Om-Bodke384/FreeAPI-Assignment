<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Om's_auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[url('./image.png')] bg-cover bg-center min-h-screen w-full">

  <nav id="nav-guest" class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <span class="font-bold text-blue-600 text-xl">Om's_authentication</span>
    <div>
      <button onclick="navigate('login')" class="text-gray-600 hover:text-blue-600 mr-4">Login</button>
      <button onclick="navigate('register')" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Register</button>
    </div>
  </nav>

  <nav id="nav-app" class="hidden bg-white shadow px-6 py-4 flex justify-between items-center">
    <span class="font-bold text-blue-600 text-xl">Om's_authentication</span>
    <div class="flex items-center gap-4">
      <span id="nav-username" class="text-gray-600 text-sm"></span>
      <!-- <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button> -->
    </div>
  </nav>

  <div id="page-login" class="hidden min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow w-full max-w-md">
      <h1 class="text-2xl font-bold mb-6">Login</h1>
      <input id="login-username" type="text" placeholder="Username"
        class="w-full border rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <input id="login-password" type="password" placeholder="Password"
        class="w-full border rounded-lg px-4 py-2 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Login</button>
      <p class="text-center text-sm text-gray-500 mt-4">
        No account?
        <button onclick="navigate('register')" class="text-blue-600 hover:underline transition duration-300">Register</button>
      </p>
    </div>
  </div>

  <div id="page-register" class="hidden min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow w-full max-w-md">
      <h1 class="text-2xl font-bold mb-6">Register</h1>
      <input id="reg-username" type="text" placeholder="Username"
        class="w-full border rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <input id="reg-email" type="email" placeholder="Email"
        class="w-full border rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <input id="reg-password" type="password" placeholder="Password"
        class="w-full border rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <select id="reg-role" class="w-full border rounded-lg px-4 py-2 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="USER">User</option>
        <option value="ADMIN">Admin</option>
      </select>
      <button onclick="handleRegister()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-1000">Create Account</button>
      <p class="text-center text-sm text-gray-500 mt-4">
        Have account?
        <button onclick="navigate('login')" class="text-blue-600 hover:underline transition duration-3000">Login</button>
      </p>
    </div>
  </div>

  <div id="page-dashboard" class="hidden p-8">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-3xl font-bold mb-2">Dashboard</h1>
       
      <p id="nav-username" class="text-gray-500 mb-8 text-blue-600">Welcome back!</p>

<div class="flex justify-center items-center mt-10">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-100 text-center">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">User Profile</h2>
        <p class="text-gray-500 mb-6">You are successfully logged in.</p>
        
        <div class="bg-blue-50 p-4 rounded-lg">
            <span class="text-blue-700 font-medium">Session Active</span>
        </div>
        
        <button class="mt-6 w-full py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition duration-300" onclick="logout()">
            Log Out
        </button>
    </div>
</div>
    </div>
    
  </div>

  <script src="index.js"></script>

</body>
</html>
