<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>YouTube Videos</title>
        <style>
            body {
                background: #0f0f0f;
                color: white;
                font-family: Arial;
                margin: 0;
                padding: 20px;
            }

            .video-container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                gap: 20px;
            }

            iframe {
                width: 100%;
                height: 300px;
                border: none;
                border-radius: 8px;
            }

            .loading {
                text-align: center;
                color: gray;
                font-size: 18px;
            }

            .error {
                color: red;
                text-align: center;
            }
        </style>
    </head>

    <body>
        <h1>YouTube Videos</h1>
        <div id="loading" class="loading">Loading videos...</div>
        <div id="error" class="error" style="display:none;"></div>
        <div id="video-container" class="video-container"></div>

        <script src="om.js"></script>
    </body>

</html>
